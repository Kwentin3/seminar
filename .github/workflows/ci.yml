name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r lint

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm -r build

      - name: Smoke leads (mock mode)
        env:
          TURNSTILE_MODE: mock
          ALLOW_TURNSTILE_MOCK: "1"
          TURNSTILE_SECRET_KEY: dummy-non-empty
          ADMIN_SECRET: dummy-admin-secret
          LEADS_BASE_URL: http://127.0.0.1:8787
          DATABASE_PATH: /tmp/seminar-ci.sqlite
          HOST: 127.0.0.1
          PORT: "8787"
        shell: bash
        run: |
          set -euo pipefail

          rm -f /tmp/seminar-ci.sqlite
          pnpm run start:vps > /tmp/seminar-app.log 2>&1 &
          APP_PID=$!

          cleanup() {
            kill "${APP_PID}" 2>/dev/null || true
            wait "${APP_PID}" 2>/dev/null || true
          }
          trap cleanup EXIT

          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:8787/" >/dev/null; then
              break
            fi
            sleep 1
          done

          if ! curl -fsS "http://127.0.0.1:8787/" >/dev/null; then
            echo "app server did not become ready in time"
            cat /tmp/seminar-app.log
            exit 1
          fi

          if ! pnpm run test:smoke:leads; then
            echo "Smoke failed. app log:"
            cat /tmp/seminar-app.log
            exit 1
          fi
