name: seminar-ghcr-smoke

services:
  seminar-app:
    image: ${SEMINAR_IMAGE:?SEMINAR_IMAGE is required}
    container_name: seminar-app
    env_file:
      - /etc/seminar/seminar.docker.env
    environment:
      HOST: "0.0.0.0"
      PORT: "8787"
      OBS_LOG_SOURCE: "docker"
      OBS_DOCKER_CONTAINER: "seminar-app"
      OBS_DOCKER_BIN: "/usr/bin/docker"
      BUILD_ID: ${BUILD_ID:?BUILD_ID is required}
    volumes:
      - /opt/seminar/parity-data:/var/lib/seminar
      - /usr/bin/docker:/usr/bin/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - edge
    labels:
      - traefik.enable=true
      - traefik.docker.network=edge
      - traefik.http.routers.seminar-web.rule=Host(`seminar-ai.ru`) || Host(`www.seminar-ai.ru`)
      - traefik.http.routers.seminar-web.entrypoints=web
      - traefik.http.routers.seminar-web.service=seminar-svc
      - traefik.http.routers.seminar-websecure.rule=Host(`seminar-ai.ru`) || Host(`www.seminar-ai.ru`)
      - traefik.http.routers.seminar-websecure.entrypoints=websecure
      - traefik.http.routers.seminar-websecure.tls=true
      - traefik.http.routers.seminar-websecure.tls.certresolver=le
      - traefik.http.routers.seminar-websecure.service=seminar-svc
      - traefik.http.services.seminar-svc.loadbalancer.server.port=8787
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8787/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

networks:
  edge:
    external: true
    name: edge
