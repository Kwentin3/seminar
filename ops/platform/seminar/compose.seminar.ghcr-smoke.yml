# Docker smoke attachment for the live production contour.
# Useful for parity/smoke gates, but not a substitute for the full go-live
# sequence with DB backup, cabinet bootstrap discipline, and rollback prep.
name: seminar-ghcr-smoke

services:
  seminar-app:
    image: ${SEMINAR_IMAGE:?SEMINAR_IMAGE is required}
    container_name: seminar-app-smoke
    env_file:
      - /etc/seminar/seminar.docker.env
    environment:
      HOST: "0.0.0.0"
      PORT: "8787"
      OBS_LOG_SOURCE: "docker"
      OBS_DOCKER_CONTAINER: "seminar-app-smoke"
      OBS_DOCKER_BIN: "/usr/bin/docker"
      BUILD_ID: ${BUILD_ID:?BUILD_ID is required}
    volumes:
      - /opt/seminar/parity-data:/var/lib/seminar
      - /usr/bin/docker:/usr/bin/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - edge
    labels:
      - traefik.enable=true
      - traefik.docker.network=edge
      - traefik.http.routers.${APP_ROUTER_NAME:?APP_ROUTER_NAME is required}-web.rule=${APP_HOST_RULE:?APP_HOST_RULE is required}
      - traefik.http.routers.${APP_ROUTER_NAME:?APP_ROUTER_NAME is required}-web.entrypoints=${TRAEFIK_ENTRYPOINTS_WEB:?TRAEFIK_ENTRYPOINTS_WEB is required}
      - traefik.http.routers.${APP_ROUTER_NAME:?APP_ROUTER_NAME is required}-web.service=${APP_ROUTER_NAME:?APP_ROUTER_NAME is required}-svc
      - traefik.http.routers.${APP_ROUTER_NAME:?APP_ROUTER_NAME is required}-websecure.rule=${APP_HOST_RULE:?APP_HOST_RULE is required}
      - traefik.http.routers.${APP_ROUTER_NAME:?APP_ROUTER_NAME is required}-websecure.entrypoints=${TRAEFIK_ENTRYPOINTS_WEBSECURE:?TRAEFIK_ENTRYPOINTS_WEBSECURE is required}
      - traefik.http.routers.${APP_ROUTER_NAME:?APP_ROUTER_NAME is required}-websecure.tls=true
      - traefik.http.routers.${APP_ROUTER_NAME:?APP_ROUTER_NAME is required}-websecure.tls.certresolver=${TRAEFIK_CERTRESOLVER:?TRAEFIK_CERTRESOLVER is required}
      - traefik.http.routers.${APP_ROUTER_NAME:?APP_ROUTER_NAME is required}-websecure.service=${APP_ROUTER_NAME:?APP_ROUTER_NAME is required}-svc
      - traefik.http.routers.${APP_ROUTER_NAME:?APP_ROUTER_NAME is required}-websecure.middlewares=${APP_MIDDLEWARES:-${APP_ROUTER_NAME:?APP_ROUTER_NAME is required}-noop}
      - traefik.http.middlewares.${APP_ROUTER_NAME:?APP_ROUTER_NAME is required}-www-redirect.redirectregex.regex=^https?://www\\.(.+)
      - traefik.http.middlewares.${APP_ROUTER_NAME:?APP_ROUTER_NAME is required}-www-redirect.redirectregex.replacement=https://${APP_WWW_REDIRECT_TO:-$${1}}
      - traefik.http.middlewares.${APP_ROUTER_NAME:?APP_ROUTER_NAME is required}-www-redirect.redirectregex.permanent=true
      - traefik.http.middlewares.${APP_ROUTER_NAME:?APP_ROUTER_NAME is required}-noop.redirectregex.regex=^$
      - traefik.http.middlewares.${APP_ROUTER_NAME:?APP_ROUTER_NAME is required}-noop.redirectregex.replacement=$${0}
      - traefik.http.middlewares.${APP_ROUTER_NAME:?APP_ROUTER_NAME is required}-noop.redirectregex.permanent=false
      - seminar.ops.www_redirect_enabled=${APP_ENABLE_WWW_REDIRECT:-0}
      - traefik.http.services.${APP_ROUTER_NAME:?APP_ROUTER_NAME is required}-svc.loadbalancer.server.port=${APP_SERVICE_PORT:?APP_SERVICE_PORT is required}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8787/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

networks:
  edge:
    external: true
    name: edge
